<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Login </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/login.js" defer></script>
</head>
<body>


    <div class="container">
        <h2>Acessar Conta</h2>

        <form>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="email@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button onclick="fazerLogin(event)" type="submit" id="btn-save">Entrar</button>
        </form>

        <div class="divider"></div>

        <div class="list-container">
            <h3>Opções de Acesso</h3>

            <div class="senha-card" style="animation-delay: 1s;">
                <div class="info">
                    <strong>Novo por aqui?</strong>
                    <span>Crie sua conta agora</span>
                </div>

                <a href="/registro">
                    <button class="pass-delete">Cadastrar</button>
                </a>

                
            </div>
        </div>
    </div>


</body>
</html>
